on:
  push:
    branches:
      - master

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run Luacheck
        uses: lunarmodules/luacheck@cc089e3f65acdd1ef8716cc73a3eca24a6b845e4 # v1
        with:
          args: >
            --read-globals
            LoGetPlayerPlaneId
            LoGetSelfData
            LuaExportActivityNextEvent
            LuaExportBeforeNextFrame
            lastPlayerPlaneId
            log
            --globals
            LuaExportActivityNextEvent
            lastPlayerPlaneId
            -- .
